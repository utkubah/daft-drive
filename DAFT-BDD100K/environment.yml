name: daft
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip

  # PyTorch + CUDA 12.4
  - pytorch>=2.2.0
  - torchvision>=0.17.0
  - pytorch-cuda=12.4

  - pip:
    # Object detection backbone
    - ultralytics>=8.1.0

    # Data loading (BDD100K via HuggingFace)
    - fiftyone>=0.23.0
    - huggingface-hub>=0.21.0

    # Evaluation
    - torchmetrics>=1.3.0

    # Image processing
    - opencv-python>=4.9.0

    # Plotting
    - matplotlib>=3.8.0

    # General
    - numpy>=1.26.0
    - pandas>=2.1.0
    - tqdm>=4.66.0
    - scipy>=1.12.0
